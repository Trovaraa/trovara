<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Forms</title>
  </head>
  <body>
    <!-- Static form definitions for Netlify to detect at deploy time -->
    <form name="newsletter" method="POST" action="/" data-netlify="true" data-netlify-honeypot="bot-field">
      <input type="hidden" name="form-name" value="newsletter" />
      <p class="hidden">
        <label>Don’t fill this out: <input name="bot-field" /></label>
      </p>
      <input name="email" type="email" />
    </form>
  </body>
</html>
